# ?????????????????????????????????????????
# Application Name
# ?????????????????????????????????????????
spring.application.name=spring-data

# ?????????????????????????????????????????
# MySQL DataSource Configuration
# ?????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/spring_learning
# jdbc protocol ? mysql ? localhost:3306 ? database name

spring.datasource.username=root
# your MySQL username

spring.datasource.password=root123
# your MySQL password

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# tells Spring which JDBC driver to use

# ?????????????????????????????????????????
# HikariCP Connection Pool (default in Boot)
# ?????????????????????????????????????????
spring.datasource.hikari.maximum-pool-size=10
# max 10 connections open at once

spring.datasource.hikari.minimum-idle=5
# keep at least 5 connections ready

spring.datasource.hikari.connection-timeout=30000
# wait max 30 seconds for a connection

# ?????????????????????????????????????????
# SQL Init - run schema.sql on startup
# ?????????????????????????????????????????
spring.sql.init.mode=always
# always run schema.sql when app starts

# ?????????????????????????????????????????
# JPA / Hibernate Settings
# ?????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
# update = Hibernate checks your @Entity classes
# and updates tables to match
# Options:
# none     ? do nothing
# validate ? check tables match entities, error if not
# update   ? add missing columns/tables (safe)
# create   ? drop and recreate tables on startup
# create-drop ? create on start, drop on stop

spring.jpa.show-sql=true
# shows the SQL Hibernate generates in console
# VERY useful for learning and debugging!

spring.jpa.properties.hibernate.format_sql=true
# formats the SQL nicely (readable)

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# tells Hibernate we are using MySQL
# so it generates MySQL-compatible SQL